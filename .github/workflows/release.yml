name: Release

# Cut a release by pushing a semver tag (e.g. v1.2.3) — easiest via `pnpm release
# v1.2.3`, which creates an annotated tag whose message is the CHANGELOG section.
# The tag runs CI and, only if it passes, publishes a GitHub Release whose body is
# that same CHANGELOG section. (Deploy is handled by Vercel's Git integration.)
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # required to create the GitHub Release

jobs:
  ci:
    name: CI (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @email/backend test:e2e
      - run: pnpm build

  release:
    name: Publish GitHub Release
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract CHANGELOG section for ${{ github.ref_name }}
        run: node scripts/changelog-section.mjs "${{ github.ref_name }}" > RELEASE_NOTES.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
