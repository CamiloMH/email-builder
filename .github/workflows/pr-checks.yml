name: PR checks

# Lightweight checks on pull requests. Deployment only happens on tags
# (see release.yml).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    name: Lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @email/backend test:e2e
      - run: pnpm build
