services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_DATABASE:-email_templates}
    ports:
      - '3306:3306'
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3005
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_DATABASE: ${DB_DATABASE:-email_templates}
      DB_SYNCHRONIZE: 'true'
      CORS_ORIGIN: http://localhost:8080
    ports:
      - '3005:3005'

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:3005
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      - mariadb
    ports:
      - '8081:8080'

volumes:
  mariadb-data:
